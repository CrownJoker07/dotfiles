set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g allow-passthrough on

set -g default-command "zsh"

set -g mouse on
set -g history-limit 50000

# ==================== Transparency ====================
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g pane-border-style "bg=default"
set -g pane-active-border-style "bg=default"
set -g status-style "bg=default"

# ==================== Plugins ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# ==================== Catppuccin Theme ====================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"

# TPM: user plugin path > Homebrew > Arch package/AUR helper
if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
if-shell '[ -f $(brew --prefix 2>/dev/null)/share/tpm/tpm ]' 'run $(brew --prefix)/share/tpm/tpm'
if-shell '[ -f /usr/share/tmux-plugin-manager/tpm ]' 'run /usr/share/tmux-plugin-manager/tpm'
