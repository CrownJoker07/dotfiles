set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g allow-passthrough on

set -g default-command "zsh"

set -g mouse on
set -g history-limit 50000

# ==================== Transparency ====================
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g pane-border-style "bg=default"
set -g pane-active-border-style "bg=default"
set -g status-style "bg=default"

# ==================== Plugins ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# ==================== Catppuccin Theme ====================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text ' #(pane_dir=#{q:pane_current_path}; repo_root="$(git -C "$pane_dir" rev-parse --show-toplevel 2>/dev/null)"; basename "${repo_root:-$pane_dir}")'
set -g @catppuccin_window_current_text ' #(pane_dir=#{q:pane_current_path}; repo_root="$(git -C "$pane_dir" rev-parse --show-toplevel 2>/dev/null)"; basename "${repo_root:-$pane_dir}")'

# TPM: user plugin path > Homebrew > Arch package/AUR helper
run-shell '[ -f ~/.tmux/plugins/tpm/tpm ] && exec ~/.tmux/plugins/tpm/tpm'
run-shell 'BREWPFX="$(brew --prefix 2>/dev/null)"; [ -n "$BREWPFX" ] && [ -f "$BREWPFX/share/tpm/tpm" ] && exec "$BREWPFX/share/tpm/tpm"'
run-shell '[ -f /usr/share/tmux-plugin-manager/tpm ] && exec /usr/share/tmux-plugin-manager/tpm'
