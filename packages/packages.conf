# Shell and prompt

[zsh] # 交互式 shell；macOS 已内置，Arch 上安装后才能作为默认登录 shell 使用
macos.system = zsh
arch.pacman = zsh

[zsh autosuggestions] # 输入命令时显示灰色历史建议，按右方向键或快捷键快速补全
macos.formula = zsh-autosuggestions
arch.pacman = zsh-autosuggestions

[zsh completions] # 补充 zsh 对更多命令参数和子命令的 Tab 补全
macos.formula = zsh-completions
arch.pacman = zsh-completions

[zsh syntax highlighting] # 在输入命令时高亮可执行命令、参数和错误路径，减少输错命令
macos.formula = zsh-syntax-highlighting
arch.pacman = zsh-syntax-highlighting

[starship] # 生成统一的命令行提示符，显示当前目录、Git 状态、语言版本和命令耗时
macos.formula = starship
arch.pacman = starship


# Terminal and session

[wezterm] # 终端模拟器；承载 zsh、tmux 和 Neovim 等终端工作流
macos.cask = wezterm
arch.pacman = wezterm

[tmux] # 在一个终端窗口里管理多个会话、窗口和面板，远程连接断开后也能保留会话
macos.formula = tmux
arch.pacman = tmux

[tmux plugin manager] # 管理 tmux 插件；当前用于安装 tmux 配置里的 Catppuccin 状态栏主题
macos.formula = tpm
arch.aur = tmux-plugin-manager


# File, search, and navigation

[bat] # 查看文件内容时提供语法高亮、行号和分页，比 cat 更适合读代码
macos.formula = bat
arch.pacman = bat

[eza] # 列目录时显示更清晰的文件类型、权限、图标、Git 状态和树形结构
macos.formula = eza
arch.pacman = eza

[fastfetch] # 在终端快速显示系统、硬件、桌面环境和主题信息
macos.formula = fastfetch
arch.pacman = fastfetch

[fd] # 按文件名查找文件；默认忽略 .gitignore 中的内容，交互使用比 find 简洁
macos.formula = fd
arch.pacman = fd

[fzf] # 在终端里交互式筛选文件、历史命令、Git 分支等列表
macos.formula = fzf
arch.pacman = fzf

[manual database] # 提供 man 命令和 manual page 索引，便于离线查看命令文档
macos.formula = man-db
arch.pacman = man-db

[manual pages] # Arch 的基础系统 manual page 内容；配合 man-db 查看系统命令文档
arch.pacman = man-pages

[ripgrep] # 在项目里高速搜索文本内容，提供 rg 命令，常用于代码检索
macos.formula = ripgrep
arch.pacman = ripgrep

[unzip] # 解压 .zip 压缩包，补齐系统常用归档格式支持
macos.formula = unzip
arch.pacman = unzip

[zoxide] # 记录常用目录并按频率跳转，用 z 命令快速进入项目目录
macos.formula = zoxide
arch.pacman = zoxide


# Editor

[neovim] # 主要代码编辑器；配置由本仓库的 Neovim dotfiles 管理
macos.formula = neovim
arch.pacman = neovim


# Git

[git] # Git 版本控制命令行工具，也是 lazygit、编辑器 Git 集成等工具的基础依赖
macos.formula = git
arch.pacman = git

[lazygit] # Git 终端界面，用于交互式查看 diff、暂存、提交、分支和日志
macos.formula = lazygit
arch.pacman = lazygit

[gh] # GitHub 官方命令行工具，用于管理 Issue、PR、Action 和 gh repo 等操作
macos.formula = gh
arch.pacman = github-cli


# Development runtimes and CLIs

[mise] # 按项目管理 Node、Python、Go 等语言运行时和 CLI 工具版本，替代系统级安装
macos.formula = mise
arch.pacman = mise

[bear] # 捕获 make 等构建命令并生成 compile_commands.json，供 clangd 等 C/C++ 工具读取
macos.formula = bear
arch.pacman = bear


# AI tools

[codex] # OpenAI Codex 命令行工具，用于在终端中调用 Codex 处理代码任务
macos.cask = codex
arch.pacman = openai-codex

[opencode] # 终端 AI 编程助手，用于在命令行里进行代码生成、修改和问答
macos.formula = opencode
arch.pacman = opencode

[cherry studio] # 桌面 AI 聊天客户端，用于管理多个模型服务和对话工作区
macos.cask = cherry-studio
arch.aur = cherry-studio-bin


# Network and remote access

[tailscale] # 基于 WireGuard 的私有网络工具，用于跨设备安全访问内网服务
macos.cask = tailscale-app
arch.pacman = tailscale

[clash verge rev] # 图形代理客户端，用于管理 Clash 订阅、规则和系统代理
macos.cask = clash-verge-rev
arch.aur = clash-verge-rev-bin


# Desktop apps

[wechat] # 微信桌面客户端，用于聊天、文件传输和日常通讯
macos.cask = wechat
arch.aur = wechat

[feishu] # 飞书桌面客户端，用于团队通讯、会议和文档协作
macos.cask = feishu
arch.aur = feishu-bin

[microsoft edge] # Microsoft Edge 浏览器；Arch 上通过 AUR 安装稳定版
macos.cask = microsoft-edge
arch.aur = microsoft-edge-stable-bin

[snipaste] # 截图和贴图工具，可把截图固定在屏幕上用于对照和标注
arch.aur = snipaste


# Fonts

[jetbrains mono nerd font] # 终端和编辑器字体；包含 Nerd Font 图标，供 prompt、文件图标和状态栏使用
macos.cask = font-jetbrains-mono-nerd-font
arch.pacman = ttf-jetbrains-mono-nerd


# Games

[steam] # Steam 游戏平台，用于安装和运行 PC 游戏
arch.pacman = steam

[unity hub] # Unity 官方项目管理器，用于安装 Unity Editor 版本和打开 Unity 项目
arch.aur = unityhub


# Linux system services

[power profiles] # Linux 电源模式服务，提供性能、平衡、省电等电源配置切换
arch.pacman = power-profiles-daemon


# Arch package management

[yay] # AUR helper；通过 archlinuxcn 安装，用来安装和更新 AUR 包
arch.archlinuxcn = yay
